<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AAdreww — ~/portfolio</title>
<style>
  :root {
    --bg: #12100c;
    --bg-well: #0a0908;
    --amber: #ffb000;
    --amber-dim: #b57e12;
    --amber-faint: #6b551c;
    --muted: #8a7e6c;
    --frame: #2b2419;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    background: var(--bg-well);
  }

  body {
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 4vh 4vw;
    font-family: ui-monospace, 'Cascadia Code', 'JetBrains Mono', Consolas, monospace;
    color: var(--amber);
    position: relative;
    overflow-x: hidden;
  }

  /* ambient vignette behind the terminal */
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at 50% 40%, rgba(255,176,0,0.06), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  .crt {
    width: min(760px, 100%);
    background: var(--bg);
    border: 1px solid var(--frame);
    border-radius: 10px;
    box-shadow:
      0 0 0 1px rgba(255,176,0,0.03),
      0 30px 80px -30px rgba(0,0,0,0.8),
      0 0 60px -10px rgba(255,176,0,0.08);
    position: relative;
    overflow: hidden;
    z-index: 1;
  }

  .titlebar {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    padding: 0.7rem 1rem;
    background: var(--frame);
    border-bottom: 1px solid #3a301f;
  }

  .dot {
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: #4a3f28;
  }

  .titlebar .path {
    margin-left: 0.5rem;
    font-size: 0.78rem;
    color: var(--muted);
    letter-spacing: 0.02em;
  }

  .screen {
    padding: 1.75rem 1.5rem 2.25rem;
    font-size: 0.92rem;
    line-height: 1.75;
    min-height: 420px;
    position: relative;
  }

  /* scanline drift overlay */
  .screen::after {
    content: "";
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      rgba(255,176,0,0.035) 0px,
      rgba(255,176,0,0.035) 1px,
      transparent 1px,
      transparent 3px
    );
    animation: drift 9s linear infinite;
    pointer-events: none;
    mix-blend-mode: overlay;
  }

  @keyframes drift {
    from { background-position: 0 0; }
    to { background-position: 0 120px; }
  }

  .line { white-space: pre-wrap; word-break: break-word; }

  .prompt .user { color: #7fb37f; }
  .prompt .at { color: var(--muted); }
  .prompt .path { color: #6fa8c9; }
  .prompt .sym { color: var(--muted); margin-right: 0.4em; }
  .prompt .cmd { color: #fff3d6; }

  .out { color: var(--amber-dim); padding-left: 0.1em; }
  .out .quote { color: var(--muted); }
  .out a { color: #6fc3c3; text-decoration: none; border-bottom: 1px dotted rgba(111,195,195,0.4); }
  .out a:hover { color: #9fe0e0; }

  .dirline { display: flex; gap: 0.9em; color: var(--amber-faint); }
  .dirline .perm { color: var(--muted); }
  .dirline .name { color: var(--amber); min-width: 15ch; }
  .dirline .desc { color: var(--muted); }

  .cursor {
    display: inline-block;
    width: 0.55em;
    height: 1em;
    background: var(--amber);
    vertical-align: text-bottom;
    animation: blink 1s steps(1) infinite;
    margin-left: 2px;
  }

  @keyframes blink {
    50% { opacity: 0; }
  }

  .gap { height: 0.85rem; }

  footer {
    margin-top: 1.5rem;
    text-align: center;
    color: var(--frame);
    font-size: 0.75rem;
    letter-spacing: 0.04em;
    z-index: 1;
    position: relative;
  }

  footer a { color: var(--amber-faint); text-decoration: none; }
  footer a:hover { color: var(--amber-dim); }

  @media (max-width: 520px) {
    .screen { font-size: 0.82rem; padding: 1.25rem 1rem 1.75rem; min-height: 380px; }
    .dirline { flex-direction: column; gap: 0.1em; }
  }

  @media (prefers-reduced-motion: reduce) {
    .screen::after { animation: none; }
    .cursor { animation: none; }
  }
</style>
</head>
<body>

<div>
  <div class="crt">
    <div class="titlebar">
      <span class="dot"></span><span class="dot"></span><span class="dot"></span>
      <span class="path">AAdreww — zsh — 80x24</span>
    </div>
    <div class="screen" id="screen" aria-label="Terminal session introducing AAdreww"></div>
  </div>
  <footer>rendered live &middot; <a href="https://github.com/AAdreww" id="gh-link">github.com/AAdreww</a></footer>
</div>

<script>
(function () {
  var screen = document.getElementById('screen');
  var reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

  function el(tag, cls, html) {
    var e = document.createElement(tag);
    if (cls) e.className = cls;
    if (html !== undefined) e.innerHTML = html;
    return e;
  }

  function promptLine(cmd) {
    var line = el('div', 'line prompt');
    line.innerHTML =
      '<span class="user">visitor</span><span class="at">@</span>' +
      '<span class="path">andev</span><span class="sym">:~$</span> ' +
      '<span class="cmd">' + cmd + '</span>';
    return line;
  }

  function outLine(html) {
    var line = el('div', 'line out', html);
    return line;
  }

  function dirLine(perm, name, desc) {
    var line = el('div', 'dirline');
    line.innerHTML =
      '<span class="perm">' + perm + '</span>' +
      '<span class="name">' + name + '</span>' +
      '<span class="desc">' + desc + '</span>';
    return line;
  }

  function gap() { return el('div', 'gap'); }

  // Each step: { cmd } typed, followed by output nodes revealed instantly after.
  var steps = [
    {
      cmd: 'whoami',
      output: [outLine('AAdreww &mdash; builder, shipper, mostly caffeine')]
    },
    {
      cmd: 'cat mission.txt',
      output: [outLine('<span class="quote">&gt;</span> Lean code. Clean design. Ship often.')]
    },
    {
      cmd: 'ls -la stack/',
      output: [
        dirLine('drwxr-xr-x', 'fast-builds/', 'lean, performant, no bloat'),
        dirLine('drwxr-xr-x', 'clean-design/', 'intentional interfaces, every screen'),
        dirLine('drwxr-xr-x', 'ship-often/', 'iterate in public, learn fast')
      ]
    },
    {
      cmd: 'cat contact.txt',
      output: [outLine('github: <a href="https://github.com/AAdreww">github.com/AAdreww</a>')]
    }
  ];

  var cursor = el('span', 'cursor');

  function typeCommand(cmdText, container, onDone) {
    var line = el('div', 'line prompt');
    line.innerHTML =
      '<span class="user">visitor</span><span class="at">@</span>' +
      '<span class="path">andev</span><span class="sym">:~$</span> ';
    var cmdSpan = el('span', 'cmd');
    line.appendChild(cmdSpan);
    line.appendChild(cursor);
    container.appendChild(line);

    if (reduceMotion) {
      cmdSpan.textContent = cmdText;
      onDone();
      return;
    }

    var i = 0;
    var speed = 32;
    (function tick() {
      if (i <= cmdText.length) {
        cmdSpan.textContent = cmdText.slice(0, i);
        i++;
        setTimeout(tick, speed);
      } else {
        onDone();
      }
    })();
  }

  function runStep(index) {
    if (index >= steps.length) {
      var doneLine = el('div', 'line prompt');
      doneLine.innerHTML =
        '<span class="user">visitor</span><span class="at">@</span>' +
        '<span class="path">andev</span><span class="sym">:~$</span> ';
      doneLine.appendChild(cursor);
      screen.appendChild(doneLine);
      return;
    }

    var step = steps[index];
    typeCommand(step.cmd, screen, function () {
      cursor.remove();
      var delay = reduceMotion ? 0 : 180;
      setTimeout(function () {
        step.output.forEach(function (node) { screen.appendChild(node); });
        screen.appendChild(gap());
        setTimeout(function () { runStep(index + 1); }, reduceMotion ? 0 : 260);
      }, delay);
    });
  }

  runStep(0);
})();
</script>

</body>
</html>
